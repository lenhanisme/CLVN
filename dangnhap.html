<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập | CL-BANK</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00f2fe; --bg-color: #0b0f19; --glass-bg: rgba(255, 255, 255, 0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-color); color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .auth-box { background: var(--glass-bg); padding: 40px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 400px; backdrop-filter: blur(10px); }
        .auth-box h2 { text-align: center; color: var(--primary); margin-bottom: 25px; font-weight: 800; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 14px; color: #aaa; }
        .form-group input { width: 100%; padding: 12px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: #fff; outline: none; }
        .form-group input:focus { border-color: var(--primary); }
        .btn-submit { width: 100%; padding: 12px; background: linear-gradient(45deg, #4facfe, #00f2fe); border: none; border-radius: 8px; color: #000; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .btn-submit:hover { opacity: 0.9; }
        .auth-links { text-align: center; margin-top: 20px; font-size: 14px; }
        .auth-links a { color: var(--primary); text-decoration: none; }
        .error-msg { color: #ff4d4d; font-size: 13px; text-align: center; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>

    <div class="auth-box">
        <h2>ĐĂNG NHẬP</h2>
        <div id="errorMsg" class="error-msg"></div>
        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="Nhập email của bạn" required>
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" id="password" placeholder="Nhập mật khẩu" required>
            </div>
            <button type="submit" class="btn-submit">Đăng Nhập</button>
        </form>
        <div class="auth-links">
            Chưa có tài khoản? <a href="dangky.html">Đăng ký tại đây</a><br><br>
            <a href="index.html">&larr; Về trang chủ</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // Cấu hình Firebase của bạn
        const firebaseConfig = {
            apiKey: "AIzaSyAsGt_7b1mcaCcm5ta7-BZmmw766kNIraA",
            authDomain: "clvn-5571b.firebaseapp.com",
            projectId: "clvn-5571b",
            storageBucket: "clvn-5571b.firebasestorage.app",
            messagingSenderId: "864443672228",
            appId: "1:864443672228:web:25d180dfc83e0212f2e831",
            measurementId: "G-CPH3LZ0RT2"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            try {
                // Đăng nhập bằng Authentication
                await signInWithEmailAndPassword(auth, email, password);
                
                // Nếu thành công, chuyển hướng về trang chủ hoặc trang game
                window.location.href = "index.html";
                
            } catch (error) {
                console.error(error);
                errorMsg.style.display = 'block';
                if(error.code === 'auth/invalid-credential' || error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
                    errorMsg.innerText = "Email hoặc mật khẩu không chính xác!";
                } else {
                    errorMsg.innerText = "Lỗi đăng nhập: " + error.message;
                }
            }
        });
    </script>
</body>
</html>
