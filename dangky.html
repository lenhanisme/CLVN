<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Tài Khoản | CLVN.VN</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --primary: #00f2fe; 
            --bg-color: #0b0f19; 
            --glass-bg: rgba(255, 255, 255, 0.05); 
        }
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Poppins', sans-serif; 
        }
        body { 
            background-color: var(--bg-color); 
            color: #fff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px; 
        }
        .auth-box { 
            background: var(--glass-bg); 
            padding: 30px; 
            border-radius: 8px; 
            border: 1px solid rgba(255,255,255,0.1); 
            width: 100%; 
            max-width: 400px; 
            backdrop-filter: blur(10px); 
        }
        .auth-box h2 { 
            text-align: center; 
            color: var(--primary); 
            margin-bottom: 20px; 
            font-weight: 800; 
        }
        .form-group { 
            margin-bottom: 15px; 
        }
        .form-group label { 
            display: block; 
            margin-bottom: 8px; 
            font-size: 14px; 
            color: #aaa; 
        }
        .form-group input, .form-group select { 
            width: 100%; 
            padding: 12px; 
            background: rgba(0,0,0,0.2); 
            border: 1px solid rgba(255,255,255,0.2); 
            border-radius: 5px; 
            color: #fff; 
            outline: none; 
            transition: 0.3s; 
        }
        .form-group input:focus, .form-group select:focus { 
            border-color: var(--primary); 
        }
        
        /* Chỉnh style riêng cho thẻ option bên trong select để dễ nhìn trên nền tối */
        .form-group select option {
            background-color: #1e293b;
            color: #fff;
        }

        .btn-submit { 
            width: 100%; 
            padding: 12px; 
            background: linear-gradient(45deg, #4facfe, #00f2fe); 
            border: none; 
            border-radius: 5px; 
            color: #000; 
            font-weight: bold; 
            font-size: 16px; 
            cursor: pointer; 
            margin-top: 15px; 
            transition: 0.3s; 
        }
        .btn-submit:hover { 
            opacity: 0.9; 
            transform: translateY(-2px); 
        }
        
        /* CSS cho phần Google */
        .divider { 
            display: flex; 
            align-items: center; 
            text-align: center; 
            margin: 20px 0; 
            color: #aaa; 
            font-size: 12px; 
        }
        .divider::before, .divider::after { 
            content: ''; 
            flex: 1; 
            border-bottom: 1px solid rgba(255,255,255,0.2); 
        }
        .divider span { 
            padding: 0 10px; 
        }
        .btn-google { 
            width: 100%; 
            padding: 12px; 
            background: #fff; 
            color: #333; 
            border: none; 
            border-radius: 5px; 
            font-weight: bold; 
            font-size: 15px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
            transition: 0.3s; 
        }
        .btn-google:hover { 
            background: #f1f1f1; 
            transform: translateY(-2px); 
        }
        .btn-google img { 
            width: 20px; 
        }
        .auth-links { 
            text-align: center; 
            margin-top: 20px; 
            font-size: 14px; 
        }
        .auth-links a { 
            color: var(--primary); 
            text-decoration: none; 
        }
        .error-msg { 
            color: #ff4d4d; 
            font-size: 13px; 
            text-align: center; 
            margin-bottom: 15px; 
            display: none; 
        }

        @media (max-width: 480px) {
            .auth-box {
                padding: 20px; 
                border-radius: 5px; 
            }
            .auth-box h2 {
                font-size: 1.5em; 
                margin-bottom: 15px;
            }
            .form-group input,
            .form-group select,
            .btn-submit,
            .btn-google {
                padding: 10px; 
                font-size: 14px; 
            }
            .auth-links {
                font-size: 12px; 
            }
        }
    </style>
</head>
<body>
    <div class="auth-box">
        <h2>ĐĂNG KÝ</h2>
        <div id="errorMsg" class="error-msg"></div>
        
        <form id="registerForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="Nhập email của bạn" required>
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" id="password" placeholder="Nhập mật khẩu (từ 6 ký tự)" required>
            </div>
            
            <div class="form-group">
                <label>Ngân hàng nhận thưởng</label>
                <select id="bankCode" required>
                    </select>
            </div>

            <div class="form-group">
                <label>Số tài khoản nhận thưởng</label>
                <input type="text" id="bankAccount" placeholder="VD: 1903... " required>
            </div>
            <button type="submit" class="btn-submit">Tạo Tài Khoản</button>
        </form>
        
        <div class="divider"><span>HOẶC</span></div>
        <button type="button" id="btnGoogle" class="btn-google">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google">
            Đăng ký bằng Google
        </button>
        <div class="auth-links">
            Đã có tài khoản? <a href="dangnhap.html">Đăng nhập ngay</a><br><br>
            <a href="index.html">&larr; Về trang chủ</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyAsGt_7b1mcaCcm5ta7-BZmmw766kNIraA",
            authDomain: "clvn-5571b.firebaseapp.com",
            projectId: "clvn-5571b",
            storageBucket: "clvn-5571b.firebasestorage.app",
            messagingSenderId: "864443672228",
            appId: "1:864443672228:web:25d180dfc83e0212f2e831",
            measurementId: "G-CPH3LZ0RT2"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();
        const errorMsg = document.getElementById('errorMsg');

        // ==================== DANH SÁCH NGÂN HÀNG ====================
        const bankList = [
            { code: "ICB", short_name: "VietinBank" }, { code: "VCB", short_name: "Vietcombank" },
            { code: "MB", short_name: "MBBank" }, { code: "ACB", short_name: "ACB" },
            { code: "VPB", short_name: "VPBank" }, { code: "TPB", short_name: "TPBank" },
            { code: "TCB", short_name: "Techcombank" }, { code: "VBA", short_name: "Agribank" },
            { code: "BIDV", short_name: "BIDV" }, { code: "STB", short_name: "Sacombank" },
            { code: "VIB", short_name: "VIB" }, { code: "HDB", short_name: "HDBank" },
            { code: "MSB", short_name: "MSB" }, { code: "SHB", short_name: "SHB" },
            { code: "EIB", short_name: "Eximbank" }, { code: "OCB", short_name: "OCB" },
            { code: "LPB", short_name: "LienVietPostBank" }, { code: "SEAB", short_name: "SeABank" },
            { code: "NAB", short_name: "NamABank" }, { code: "VCCB", short_name: "VietCapitalBank" },
            { code: "GPB", short_name: "GPBank" }, { code: "PVCB", short_name: "PVcomBank" },
            { code: "NCB", short_name: "NCB" }, { code: "SHBVN", short_name: "ShinhanBank" },
            { code: "SCB", short_name: "SCB" }, { code: "PGB", short_name: "PGBank" },
            { code: "SGICB", short_name: "SaigonBank" }, { code: "DOB", short_name: "DongABank" },
            { code: "BAB", short_name: "BacABank" }, { code: "ABB", short_name: "ABBANK" },
            { code: "VAB", short_name: "VietABank" }, { code: "VIETBANK", short_name: "VietBank" },
            { code: "BVB", short_name: "BaoVietBank" }, { code: "KLB", short_name: "KienLongBank" },
            { code: "COOPBANK", short_name: "COOPBANK" }
        ];

        // Nạp danh sách ngân hàng vào thẻ <select>
        const bankSelect = document.getElementById('bankCode');
        bankSelect.innerHTML = '<option value="">-- Chọn ngân hàng --</option>';
        bankList.forEach(bank => {
            bankSelect.innerHTML += `<option value="${bank.code}">${bank.short_name} (${bank.code})</option>`;
        });

        // Xử lý đăng ký Email/Password
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const bankCode = document.getElementById('bankCode').value; // Lấy mã ngân hàng
            const bankAccount = document.getElementById('bankAccount').value;
            
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                // Lưu thêm bankCode vào Firebase
                await setDoc(doc(db, "users", user.uid), {
                    email: email,
                    bankCode: bankCode, 
                    bankAccount: bankAccount,
                    balance: 0,
                    createdAt: new Date()
                });
                
                alert("Đăng ký thành công! Đang chuyển hướng...");
                window.location.href = "dangnhap.html";
            } catch (error) {
                console.error(error);
                errorMsg.style.display = 'block';
                if(error.code === 'auth/email-already-in-use') errorMsg.innerText = "Email này đã được sử dụng!";
                else if(error.code === 'auth/weak-password') errorMsg.innerText = "Mật khẩu quá yếu (cần ít nhất 6 ký tự)!";
                else errorMsg.innerText = "Lỗi đăng ký: " + error.message;
            }
        });

        // Xử lý đăng ký bằng Google
        document.getElementById('btnGoogle').addEventListener('click', async () => {
            try {
                const result = await signInWithPopup(auth, googleProvider);
                const user = result.user;
                
                // Sử dụng { merge: true } để không ghi đè nếu user đã tồn tại
                await setDoc(doc(db, "users", user.uid), {
                    email: user.email,
                    balance: 0,
                    lastLogin: new Date()
                }, { merge: true });
                
                window.location.href = "index.html"; 
            } catch (error) {
                console.error(error);
                errorMsg.style.display = 'block';
                errorMsg.innerText = "Lỗi đăng nhập Google: " + error.message;
            }
        });
    </script>
</body>
</html>
