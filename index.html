<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Game Chẵn Lẻ Bank - CLVN.VN</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .game-box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #333; margin-bottom: 20px; }
        input { width: 90%; padding: 12px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; }
        .btn-group { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; color: white; }
        .btn-chan { background-color: #28a745; }
        .btn-chan:hover { background-color: #218838; }
        .btn-le { background-color: #007bff; }
        .btn-le:hover { background-color: #0069d9; }
        #result { margin-top: 20px; padding: 15px; background: #e9ecef; border-radius: 6px; display: none; }
        #result img { max-width: 100%; border-radius: 8px; margin-top: 10px; }
        .bank-info { font-size: 14px; color: #555; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="game-box">
        <h2>Chẵn Lẻ MBBank</h2>
        <div class="bank-info">
            Người nhận: <b>LE NGOC NHAN</b><br>
            STK: <b>4477040408</b> (MBBank)
        </div>
        
        <input type="number" id="coinAmount" placeholder="Nhập số tiền cược (VD: 10000)" min="10000" step="1000">
        
        <div class="btn-group">
            <button class="btn-chan" onclick="generateQR('CHAN')">Cược CHẴN</button>
            <button class="btn-le" onclick="generateQR('LE')">Cược LẺ</button>
        </div>

        <div id="result">
            <p id="instruction"></p>
            <img id="qrImage" src="" alt="Mã QR Thanh Toán">
        </div>
    </div>

    <script>
        function generateQR(choice) {
            const amount = document.getElementById('coinAmount').value;
            if (!amount || amount < 5000) {
                alert("Vui lòng nhập số tiền hợp lệ (Tối thiểu 5,000đ)!");
                return;
            }

            const bankBin = "970422"; // BIN của MBBank
            const accountNo = "4477040408";
            const accountName = "LE NGOC NHAN";
            const content = choice; // Nội dung chuyển khoản là CHAN hoặc LE

            // Tạo link QR từ VietQR
            const qrUrl = `https://img.vietqr.io/image/${bankBin}-${accountNo}-compact2.png?amount=${amount}&addInfo=${content}&accountName=${encodeURIComponent(accountName)}`;
            
            document.getElementById('instruction').innerHTML = `Vui lòng quét mã QR hoặc chuyển <b>${amount}đ</b> với nội dung <b>${content}</b>`;
            document.getElementById('qrImage').src = qrUrl;
            document.getElementById('result').style.display = 'block';
        }
    </script>
</body>
</html>
